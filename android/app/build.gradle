plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.kidsbus"
    compileSdk = 35

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        // إضافة خيارات لقمع تحذيرات Java
        compilerArgs += ["-Xlint:-options", "-Xlint:-deprecation"]
    }

    kotlinOptions {
        jvmTarget = "17"
        // إضافة خيارات Kotlin لتجنب التحذيرات
        freeCompilerArgs += ["-Xjvm-default=all"]
    }

    // Build speed optimizations (updated for modern AGP)
    packaging {
        resources {
            pickFirsts += ['**/libc++_shared.so', '**/libjsc.so']
        }
    }

    defaultConfig {
        applicationId = "com.example.kidsbus"
        minSdk = 23
        targetSdk = 35
        versionCode = 1
        versionName = "1.0"
        multiDexEnabled = true

        // تحسينات لتقليل حجم التطبيق
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }


    }

    buildTypes {
        debug {
            minifyEnabled = false
            shrinkResources = false
            debuggable = true
            applicationIdSuffix = ".debug"
            // إعدادات إضافية للـ debug
            jniDebuggable = false
            renderscriptDebuggable = false
        }
        release {
            signingConfig = signingConfigs.debug
            // تعطيل التحسينات مؤقتاً لتجنب JVM crash
            minifyEnabled = false
            shrinkResources = false
            debuggable = false

            // إعدادات ProGuard بسيطة
            // proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}

// تطبيق Google Services plugin في النهاية لتجنب مشاكل البحث عن الملف
apply plugin: 'com.google.gms.google-services'
