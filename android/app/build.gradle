plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.kidsbus"
    compileSdk = 35

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    // Build speed optimizations (updated for modern AGP)
    packaging {
        resources {
            pickFirsts += ['**/libc++_shared.so', '**/libjsc.so']
        }
    }

    defaultConfig {
        applicationId = "com.example.kidsbus"
        minSdk = 23
        targetSdk = 35
        versionCode = 1
        versionName = "1.0"
        multiDexEnabled = true

        // تحسينات لتقليل حجم التطبيق
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }


    }

    buildTypes {
        debug {
            minifyEnabled = false
            shrinkResources = false
            debuggable = true
            applicationIdSuffix = ".debug"
        }
        release {
            signingConfig = signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
            debuggable = false
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}

// تطبيق Google Services plugin في النهاية لتجنب مشاكل البحث عن الملف
apply plugin: 'com.google.gms.google-services'
