plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.kidsbus"
    compileSdk = 35

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
        // تحسين عملية الترجمة
        incremental = true
    }

    kotlinOptions {
        jvmTarget = "21"
        // تحسينات Kotlin للسرعة مع JDK 21
        freeCompilerArgs += [
            "-opt-in=kotlin.RequiresOptIn",
            "-Xjvm-default=all",
            "-Xjdk-release=21"
        ]
    }

    // Build speed optimizations (updated for modern AGP)
    packaging {
        resources {
            pickFirsts += ['**/libc++_shared.so', '**/libjsc.so']
            excludes += [
                '/META-INF/{AL2.0,LGPL2.1}',
                '/META-INF/DEPENDENCIES',
                '/META-INF/LICENSE',
                '/META-INF/LICENSE.txt',
                '/META-INF/NOTICE',
                '/META-INF/NOTICE.txt'
            ]
        }
    }

    // تحسينات إضافية للسرعة
    buildFeatures {
        buildConfig = true
        viewBinding = false
        dataBinding = false
    }

    defaultConfig {
        applicationId = "com.example.kidsbus"
        minSdk = 23
        targetSdk = 35
        versionCode = 1
        versionName = "1.0"
        multiDexEnabled = true

        // تحسينات لتقليل حجم التطبيق والسرعة
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }

        // تحسينات إضافية للسرعة
        vectorDrawables.useSupportLibrary = true

        // تحسين عملية البناء
        testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        debug {
            minifyEnabled = false
            shrinkResources = false
            debuggable = true
            applicationIdSuffix = ".debug"
            // تحسينات للسرعة في وضع التطوير
            crunchPngs = false
            zipAlignEnabled = false
            // تسريع عملية البناء
            renderscriptOptimLevel = 0
        }
        release {
            signingConfig = signingConfigs.debug
            minifyEnabled = false
            shrinkResources = false
            debuggable = false
            crunchPngs = true
            zipAlignEnabled = true
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}

// تطبيق Google Services plugin في النهاية لتجنب مشاكل البحث عن الملف
apply plugin: 'com.google.gms.google-services'
