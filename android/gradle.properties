# إعدادات Gradle محسنة للسرعة القصوى
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=2G -XX:+UseG1GC -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError

# إعدادات Android أساسية
android.useAndroidX=true
android.enableJetifier=true

# إعدادات بناء سريعة محسنة
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
org.gradle.workers.max=8
org.gradle.vfs.watch=true
org.gradle.unsafe.configuration-cache=true

# تسريع عمليات البناء
android.enableBuildCache=true
android.enableD8.desugaring=true
android.enableR8.fullMode=false
android.nonTransitiveRClass=false
android.suppressUnsupportedCompileSdk=35

# إعدادات Java محسنة
org.gradle.toolchains.auto-download=true
org.gradle.java.installations.auto-detect=true

# إعدادات Kotlin محسنة للسرعة
kotlin.incremental=true
kotlin.incremental.android=true
kotlin.incremental.java=true
kotlin.incremental.js=true
kotlin.caching.enabled=true
kotlin.parallel.tasks.in.project=true

# تحسينات إضافية للسرعة
android.defaults.buildfeatures.buildconfig=true
android.experimental.enableSourceSetPathsMap=true
android.experimental.cacheCompileLibResources=true

# تحسين استخدام الذاكرة
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=2G -XX:+UseG1GC -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError -Dkotlin.daemon.jvm.options="-Xmx4G"
