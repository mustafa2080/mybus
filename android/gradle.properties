org.gradle.jvmargs=-Xmx6G -XX:MaxMetaspaceSize=3G -XX:+UseG1GC -XX:+UseStringDeduplication -XX:+UseCompressedOops -Dfile.encoding=UTF-8 --add-opens=java.base/java.lang.ref=ALL-UNNAMED --add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED
android.useAndroidX=true
android.enableJetifier=true
android.nonTransitiveRClass=false
android.enableR8.fullMode=false
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.caching=true
org.gradle.workers.max=8
org.gradle.vfs.watch=true
org.gradle.unsafe.configuration-cache=false

# Java 21 compatibility
org.gradle.toolchains.auto-download=true

# Build speed optimizations (removed deprecated android.enableBuildCache)
kotlin.incremental=true
kotlin.incremental.android=true
kotlin.incremental.java=true
