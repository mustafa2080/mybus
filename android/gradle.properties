# إعدادات JVM محسنة لـ Gradle 8.9
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:+UseG1GC -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError

# إعدادات Android أساسية
android.useAndroidX=true
android.enableJetifier=true
android.nonTransitiveRClass=false

# إعدادات R8 محسنة
android.enableR8.fullMode=false

# إعدادات Gradle للاستقرار الكامل (تعطيل جميع أنواع الكاش)
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.caching=false
org.gradle.configureondemand=false

# تحسين عدد العمليات
org.gradle.workers.max=2

# إعدادات Kotlin
kotlin.incremental=true

# إعدادات Java compatibility
org.gradle.toolchains.auto-download=true

# إعدادات إضافية
android.defaults.buildfeatures.buildconfig=true
android.nonFinalResIds=false

# إعدادات جديدة لـ Gradle 8.9 (تعطيل الميزات التي تسبب مشاكل الكاش)
org.gradle.unsafe.configuration-cache=false
org.gradle.vfs.watch=false
org.gradle.build-cache.local.enabled=false
org.gradle.build-cache.remote.enabled=false

# إعدادات إضافية لتجنب مشاكل الكاش (تعطيل كامل)
org.gradle.unsafe.isolated-projects=false
org.gradle.dependency.verification=off
org.gradle.logging.level=info

# تعطيل جميع أنواع الكاش والتحسينات
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:+UseG1GC -Dfile.encoding=UTF-8 -Dorg.gradle.internal.launcher.welcomeMessageEnabled=false
org.gradle.console=plain
org.gradle.warning.mode=all
