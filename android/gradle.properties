# إعدادات JVM وإخفاء تحذيرات Firebase
org.gradle.jvmargs=-Xmx1G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=128m -XX:+HeapDumpOnOutOfMemoryError -Dorg.gradle.warning.mode=none

# إعدادات Android
android.useAndroidX=true
android.enableJetifier=true
android.overridePathCheck=true
android.suppressUnsupportedCompileSdk=true
android.suppressUnsupportedOptionWarnings=true

# إعدادات Gradle
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.configureondemand=false
org.gradle.caching=false
org.gradle.warning.mode=none

# Network configuration
systemProp.http.connectionTimeout=60000
systemProp.http.socketTimeout=60000
systemProp.https.connectionTimeout=60000
systemProp.https.socketTimeout=60000

# Flutter settings
flutter.minSdkVersion=23
flutter.targetSdkVersion=35
flutter.compileSdkVersion=35

# Android build settings
# R8 is enabled by default in newer Android Gradle Plugin versions
