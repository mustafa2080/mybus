# تحسين إعدادات الذاكرة لحل مشكلة Out of Memory
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:+UseG1GC -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
android.nonTransitiveRClass=false

# إعدادات R8 محسنة
android.enableR8.fullMode=false

# تحسين إعدادات Gradle للاستقرار
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=false

# Java compatibility
org.gradle.toolchains.auto-download=true

# تحسينات إضافية
org.gradle.workers.max=4
kotlin.incremental=true

# إعدادات إضافية لحل مشاكل البناء
android.defaults.buildfeatures.buildconfig=true
android.nonFinalResIds=false
