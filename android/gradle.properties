# إعدادات Gradle 8.9 + JDK 21 محسنة للسرعة القصوى
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=2G -XX:+UseZGC -Dfile.encoding=UTF-8 --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=java.prefs/java.util.prefs=ALL-UNNAMED --add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED --add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED --add-opens=java.base/java.nio.charset=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED

# إعدادات Android أساسية
android.useAndroidX=true
android.enableJetifier=true

# إعدادات بناء سريعة محسنة لـ Gradle 8.9
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=false
org.gradle.workers.max=8
org.gradle.vfs.watch=true
org.gradle.configuration-cache=true

# تسريع عمليات البناء
android.enableD8.desugaring=true
android.enableR8.fullMode=false
android.nonTransitiveRClass=false
android.suppressUnsupportedCompileSdk=35

# إعدادات Java محسنة
org.gradle.toolchains.auto-download=true
org.gradle.java.installations.auto-detect=true

# إعدادات Kotlin محسنة للسرعة مع JDK 21
kotlin.incremental=true
kotlin.incremental.android=true
kotlin.incremental.java=true
kotlin.incremental.js=true
kotlin.caching.enabled=true
kotlin.parallel.tasks.in.project=true

# تحسينات إضافية للسرعة مع Gradle 8.9
android.defaults.buildfeatures.buildconfig=true
android.experimental.enableSourceSetPathsMap=false
android.experimental.cacheCompileLibResources=false

# تحسين استخدام الذاكرة لـ JDK 21
kotlin.daemon.jvm.options=-Xmx4G --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED
