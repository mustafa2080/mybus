# إعدادات JVM محسنة لمنع التعطل
org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=512m -XX:+UseG1GC -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError -XX:+UseStringDeduplication

# إعدادات Android أساسية
android.useAndroidX=true
android.enableJetifier=true
android.nonTransitiveRClass=false

# تعطيل R8 الكامل لتجنب التعطل
android.enableR8.fullMode=false

# إعدادات Gradle للاستقرار (تعطيل المتوازي لتجنب التعطل)
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.caching=false
org.gradle.configureondemand=false

# تقليل عدد العمليات المتوازية
org.gradle.workers.max=1

# تعطيل Kotlin incremental لتجنب مشاكل الذاكرة
kotlin.incremental=false

# إعدادات Java compatibility
org.gradle.toolchains.auto-download=false

# إعدادات إضافية للاستقرار
android.defaults.buildfeatures.buildconfig=true
android.nonFinalResIds=false
android.suppressUnsupportedCompileSdk=34
