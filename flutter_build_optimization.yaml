# إعدادات تحسين بناء Flutter لتقليل حجم التطبيق
# Flutter Build Optimization Configuration

# إعدادات ضغط الصور
image_compression:
  enabled: true
  quality: 85
  max_width: 1024
  max_height: 1024
  
# إعدادات الأصول
assets:
  # ضغط الصور تلقائياً
  compress_images: true
  # إزالة الصور غير المستخدمة
  remove_unused: true
  # تحويل PNG إلى WebP عند الإمكان
  convert_to_webp: true

# إعدادات البناء
build:
  # تفعيل Tree Shaking
  tree_shaking: true
  # ضغط الخطوط
  compress_fonts: true
  # إزالة التعليقات والمسافات الزائدة
  minify: true
  
# إعدادات Flutter Web (إذا كان مطلوب)
web:
  # ضغط JavaScript
  minify_js: true
  # ضغط CSS
  minify_css: true
  # تفعيل Gzip
  enable_gzip: true

# إعدادات Android
android:
  # تفعيل App Bundle بدلاً من APK
  use_app_bundle: true
  # ضغط الموارد
  compress_resources: true
  # إزالة الموارد غير المستخدمة
  remove_unused_resources: true
  
# إعدادات iOS
ios:
  # تفعيل Bitcode
  enable_bitcode: true
  # ضغط الصور
  compress_images: true
